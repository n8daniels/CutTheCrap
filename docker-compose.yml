version: '3.8'

services:
  rag-comparison:
    build: .
    image: cutthe crap-rag-comparison:latest
    container_name: rag-comparison-demo
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONGRESS_API_KEY=${CONGRESS_API_KEY:-}
    command: python src/demo/side_by_side_comparison.py

  notebook:
    build: .
    image: cutthe crap-rag-comparison:latest
    container_name: rag-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./results:/app/results
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
