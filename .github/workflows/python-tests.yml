name: Python Tests

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Verify project structure
      run: |
        python verify_setup.py

    - name: Run basic import tests
      run: |
        python -c "from rag.shared.chunker import DocumentChunker; print('✓ Chunker import')"
        python -c "from rag.without_mcp.rag_system import TraditionalRAG; print('✓ Traditional RAG import')"
        python -c "from rag.with_mcp.rag_system import MCPEnhancedRAG; print('✓ MCP RAG import')"
        python -c "from analysis.comparator import RAGComparator; print('✓ Comparator import')"

    - name: Run pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
